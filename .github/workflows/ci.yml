name: CI

on:
  push:
    branches: ['**']
  pull_request:
  workflow_dispatch:

# Cancel superseded runs on the same ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Typecheck · Test · Build
    runs-on: ubuntu-latest
    env:
      # The Electron binary isn't needed for typecheck/test/build (Vite bundles
      # via Rollup); skip the large postinstall download.
      ELECTRON_SKIP_BINARY_DOWNLOAD: '1'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Format check
        run: npm run format:check

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

  package-windows:
    name: Windows installer (NSIS)
    # Builds the self-contained installer (SPEC §12 #21). Runs on pushes to main
    # (so every merge produces a downloadable installer to test), on version
    # tags, and on manual dispatch — after verification passes. Once things are
    # stable this can be tightened to tags-only to save CI minutes.
    needs: verify
    if: >-
      github.ref == 'refs/heads/main' ||
      startsWith(github.ref, 'refs/tags/v') ||
      github.event_name == 'workflow_dispatch'
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Fetch bundled tools (Tesseract, Poppler, Pandoc, TinyTeX)
        run: pwsh scripts/fetch-win-tools.ps1

      - name: Build + package Windows installer
        run: npm run dist:win

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: release/*.exe
          if-no-files-found: warn
